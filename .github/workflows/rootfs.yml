name: Build Standard Rootfs (Ignore GPG)

on:
  workflow_dispatch:
    inputs:
      suite:
        description: '发行版代号 (如: trixie, bookworm, sid)'
        required: true
        default: 'trixie'
        type: string
      variant:
        description: '构建变体 (standard: 完整标准用户态 / minbase: 极简容器态)'
        required: false
        default: 'standard'
        type: string
      url:
        description: '镜像源 URL (留空则激活 mmdebstrap 智能全量官方源补全)'
        required: false
        default: ''
        type: string
      extra_args:
        description: '用户自定义附加参数'
        required: false
        default: ''
        type: string

jobs:
  build-rootfs:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-26.04
            arch: amd64
          - runner: ubuntu-26.04-arm
            arch: arm64
            
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mmdebstrap genext2fs

      - name: Build Rootfs (tar.gz & ext4)
        env:
          SUITE: ${{ inputs.suite }}
          VARIANT: ${{ inputs.variant }}
          URL: ${{ inputs.url }}
          EXTRA_ARGS: ${{ inputs.extra_args }}
          ARCH: ${{ matrix.arch }}
        run: |
          # 1. 使用 Bash 数组 (Array) 完美封装参数，彻底免疫空格切分灾难
          OPTS=(
            --arch="$ARCH"
            --components=main
            --dpkgopt='path-exclude=/lib/firmware/*'
            --aptopt='Acquire::AllowInsecureRepositories "true"'
            --aptopt='Acquire::AllowDowngradeToInsecureRepositories "true"'
            --aptopt='APT::Get::AllowUnauthenticated "true"'
          )
          
          # 2. 动态追加变体参数
          if [ -n "$VARIANT" ]; then
            OPTS+=("--variant=$VARIANT")
          fi
          
          # 3. 动态解析用户输入的附加参数 (完美尊重内部单双引号)
          if [ -n "$EXTRA_ARGS" ]; then
            # 使用 eval 让 Bash 重新按照标准的命令行规则去吞吐引号和空格
            eval "TEMP_EXTRA_ARRAY=($EXTRA_ARGS)"
            OPTS+=("${TEMP_EXTRA_ARRAY[@]}")
          fi
          
          # 4. 生成 tar.gz 归档包
          # 使用 "${OPTS[@]}" 展开数组，能绝对保证里面带有空格的 aptopt 参数不被拆散
          echo "Generating tar.gz rootfs..."
          if [ -n "$URL" ]; then
            mmdebstrap "${OPTS[@]}" "$SUITE" "rootfs-${SUITE}-${ARCH}.tar.gz" "$URL"
          else
            mmdebstrap "${OPTS[@]}" "$SUITE" "rootfs-${SUITE}-${ARCH}.tar.gz"
          fi

          # 5. 生成 ext4 原始镜像
          echo "Generating ext4 raw filesystem image..."
          if [ -n "$URL" ]; then
            mmdebstrap "${OPTS[@]}" "$SUITE" "rootfs-${SUITE}-${ARCH}.ext4" "$URL"
          else
            mmdebstrap "${OPTS[@]}" "$SUITE" "rootfs-${SUITE}-${ARCH}.ext4"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.suite }}-${{ matrix.arch }}
          path: |
            rootfs-${{ inputs.suite }}-${{ matrix.arch }}.tar.gz
            rootfs-${{ inputs.suite }}-${{ matrix.arch }}.ext4
